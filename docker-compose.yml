version: '3.8'
services:
  app:
    build: .
    ports:
      - "8080:8080"
    depends_on:
      - db
    environment:
      - DB_HOST=db
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - DB_NAME=expense_tracking
      - DB_PORT=5432
    volumes:
      - .:/app
    networks:
      - expense-network

  db:
    image: postgres:latest
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=expense_tracking
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - expense-network

volumes:
  postgres_data:

networks:
  expense-network:
    driver: bridge
